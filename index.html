<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Compras Bonificadas — Clube do Viajante</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  :root {
    --bg:#0d0d14;--surface:#13131f;--card:#1a1a2e;--border:#252540;
    --text:#e8e8f0;--muted:#6b6b8a;
    --livelo:#df0979;--livelo-dim:rgba(223,9,121,0.15);
    --esfera:#e8371b;--esfera-dim:rgba(232,55,27,0.15);
    --smiles:#f97316;--smiles-dim:rgba(249,115,22,0.15);
    --azul:#0ea5e9;--azul-dim:rgba(14,165,233,0.15);
    --latam:#dc2626;--latam-dim:rgba(220,38,38,0.15);
    --green:#34d399;--dollar:#60a5fa;--dollar-dim:rgba(96,165,250,0.12);
    --red:#f87171;
    --cdv-navy:#2a3246;--cdv-coral:#ff585e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}

  header{background:var(--cdv-navy);border-bottom:3px solid var(--cdv-coral);padding:14px 22px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .logo-dot{width:32px;height:32px;background:var(--cdv-coral);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
  .title-main{font-size:15px;font-weight:800;color:#fff;line-height:1.2}
  .title-sub{font-size:11px;color:rgba(255,255,255,.5)}
  .badge{font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:20px}
  .badge strong{color:var(--green)}
  .hright{margin-left:auto}
  .refresh-btn{background:var(--cdv-coral);border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .2s}
  .refresh-btn:hover{opacity:.85}
  .refresh-btn:disabled{opacity:.5;cursor:not-allowed}

  .controls{padding:11px 22px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:65px;z-index:99}
  input[type=text]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;width:210px;outline:none;transition:border-color .2s}
  input[type=text]:focus{border-color:var(--cdv-coral)}
  input[type=text]::placeholder{color:var(--muted)}
  .fbtn{border:1px solid var(--border);background:transparent;color:var(--muted);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:all .15s}
  .fbtn:hover{color:var(--text);border-color:var(--cdv-coral)}
  .fbtn.active{background:rgba(255,88,94,.12);border-color:var(--cdv-coral);color:var(--cdv-coral)}
  select.srt{margin-left:auto;background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;outline:none}

  .cat-bar{padding:8px 22px 10px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
  .cbtn{border:1px solid var(--border);background:transparent;color:var(--muted);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s}
  .cbtn:hover{border-color:var(--text);color:var(--text)}
  .cbtn.active{background:rgba(255,88,94,.12);border-color:var(--cdv-coral);color:var(--cdv-coral)}
  .cbtn .cc{background:var(--border);border-radius:4px;padding:1px 5px;font-size:10px;color:var(--muted);font-weight:700}
  .cbtn.active .cc{background:var(--cdv-coral);color:#fff}

  .stats{display:flex;gap:18px;padding:9px 22px;border-bottom:1px solid var(--border);flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .stats strong{color:var(--text);font-size:14px;font-weight:700}
  .sdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;padding:18px 22px}

  /* CARD */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
  .card:hover{transform:translateY(-2px)}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
  .card.winner-livelo::before{background:var(--livelo)}
  .card.winner-esfera::before{background:var(--esfera)}
  .card.winner-smiles::before{background:var(--smiles)}
  .card.winner-azul::before{background:var(--azul)}
  .card.winner-latam::before{background:var(--latam)}
  .card.winner-both::before{background:linear-gradient(90deg,var(--cdv-coral),#f97316)}
  .card.winner-livelo:hover{border-color:var(--livelo)}
  .card.winner-esfera:hover{border-color:var(--esfera)}
  .card.winner-smiles:hover{border-color:var(--smiles)}
  .card.winner-azul:hover{border-color:var(--azul)}
  .card.winner-latam:hover{border-color:var(--latam)}
  .card.winner-both:hover{border-color:var(--cdv-coral)}
  .card.is-dollar:hover{border-color:var(--dollar)}

  .pname{font-size:13px;font-weight:700;line-height:1.3}
  .pts-row{display:flex;align-items:baseline;gap:4px}
  .pts-val{font-size:26px;font-weight:900;line-height:1}
  .winner-livelo .pts-val{color:var(--livelo)}
  .winner-esfera .pts-val{color:var(--esfera)}
  .winner-smiles .pts-val{color:var(--smiles)}
  .winner-azul .pts-val{color:var(--azul)}
  .winner-latam .pts-val{color:var(--latam)}
  .winner-both .pts-val{color:var(--cdv-coral)}
  .pts-lbl{font-size:11px;color:var(--muted)}

  .prog-badges{display:flex;gap:4px;flex-wrap:wrap}
  .pbdg{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap}
  .pbdg-livelo{background:var(--livelo-dim);color:var(--livelo);border:1px solid rgba(223,9,121,.3)}
  .pbdg-esfera{background:var(--esfera-dim);color:var(--esfera);border:1px solid rgba(232,55,27,.3)}
  .pbdg-smiles{background:var(--smiles-dim);color:var(--smiles);border:1px solid rgba(249,115,22,.3)}
  .pbdg-azul{background:var(--azul-dim);color:var(--azul);border:1px solid rgba(14,165,233,.3)}
  .pbdg-latam{background:var(--latam-dim);color:var(--latam);border:1px solid rgba(220,38,38,.3)}

  .tag-dollar{background:var(--dollar-dim);border:1px solid rgba(96,165,250,.2);border-radius:5px;padding:2px 7px;font-size:10px;color:var(--dollar);font-weight:600;width:fit-content}
  .card-foot{margin-top:auto;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  /* STATUS */
  .status-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;grid-column:1/-1;text-align:center}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--cdv-coral);border-radius:50%;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:16px 20px;color:var(--red);font-size:13px;grid-column:1/-1;text-align:center;line-height:1.8}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:420px;width:100%;position:relative}
  .modal-close{position:absolute;top:14px;right:16px;background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
  .modal-close:hover{color:var(--text)}
  .modal-name{font-size:18px;font-weight:800;margin-bottom:4px}
  .modal-cat{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:20px}
  .modal-rows{display:flex;flex-direction:column;gap:10px}
  .modal-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s,background .15s}
  .modal-row:hover{background:#1f1f38;border-color:var(--muted)}
  .modal-row.best:hover{border-color:var(--cdv-coral);background:#1f1f38}
  .modal-row.best{border-color:var(--cdv-coral)}
  .modal-prog{display:flex;align-items:center;gap:8px}
  .modal-prog-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .modal-prog-name{font-size:13px;font-weight:600}
  .modal-pts{font-size:22px;font-weight:900}
  .modal-pts-lbl{font-size:11px;color:var(--muted);margin-top:1px;text-align:right}
  .best-badge{font-size:10px;font-weight:700;color:var(--cdv-coral);margin-top:4px}
  .modal-url{display:block;margin-top:16px;text-align:center;font-size:12px;color:var(--cdv-coral);text-decoration:none;padding:10px;border:1px solid rgba(255,88,94,.3);border-radius:8px;transition:background .15s}
  .modal-url:hover{background:rgba(255,88,94,.08)}

  @media(max-width:600px){
    header,.controls{padding:10px 14px}
    .cat-bar,.stats{padding:8px 14px}
    .grid{padding:14px;gap:9px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
    input[type=text]{width:100%}
    select.srt{margin-left:0}
    .controls{top:58px}
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot">CDV</div>
  <div>
    <div class="title-main">Compras Bonificadas</div>
    <div class="title-sub">Clube do Viajante · Livelo, Esfera, Smiles, Azul & LATAM</div>
  </div>
  <div class="badge" id="update-badge">Carregando…</div>
  <div class="hright">
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">⟳ Atualizar</button>
  </div>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar parceiro ou categoria…" oninput="render()">
  <button class="fbtn" data-filter="dollar">U$ dólar</button>
  <button class="fbtn" data-filter="ate">Até X pts</button>
  <select class="srt" id="sort" onchange="render()">
    <option value="pts_desc">Maior pontuação</option>
    <option value="pts_asc">Menor pontuação</option>
    <option value="name">A → Z</option>
  </select>
</div>

<div class="cat-bar" id="cat-bar"></div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid">
  <div class="status-box"><div class="spinner"></div><div style="color:var(--muted);font-size:13px">Buscando parceiros…</div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-cat" id="modal-cat"></div>
    <div class="modal-rows" id="modal-rows"></div>
    <a class="modal-url" id="modal-url" href="#" target="_blank">↗ Ver melhor oferta</a>
  </div>
</div>

<script>
const PROXY = 'https://cdv-proxy-production.up.railway.app/fetch';
const PROGRAMS = [
  { id:'livelo',  name:'Livelo',      color:'#df0979', dim:'rgba(223,9,121,0.15)',
    url:'https://www.comparemania.com.br/lojas/pontos-milhas/programa-fidelidade-livelo' },
  { id:'esfera',  name:'Esfera',      color:'#e8371b', dim:'rgba(232,55,27,0.15)',
    url:'https://www.comparemania.com.br/lojas/pontos-milhas/programa-fidelidade-santander-esfera' },
  { id:'smiles',  name:'Smiles',      color:'#f97316', dim:'rgba(249,115,22,0.15)',
    url:'https://www.comparemania.com.br/lojas/pontos-milhas/programa-fidelidade-smiles' },
  { id:'azul',    name:'Azul',        color:'#0ea5e9', dim:'rgba(14,165,233,0.15)',
    url:'https://www.comparemania.com.br/lojas/pontos-milhas/programa-fidelidade-azul' },
  { id:'latam',   name:'LATAM Pass',  color:'#dc2626', dim:'rgba(220,38,38,0.15)',
    url:'https://www.comparemania.com.br/lojas/pontos-milhas/programa-fidelidade-latam-pass' },
];

// ─── Categorias ───────────────────────────────────────────────────────────────
const CAT_RULES=[
  [/seguro.*(viagem|travel|vida|residencial|celular|auto|moto|odonto)/i,'Seguros'],
  [/seguro|assist.card|coris|ciclic|hero.seguro|universal.assist|medsenior|suhai|mapfre|next.seguro/i,'Seguros'],
  [/consórcio|consorcio|klubi|embracon|mycon|bradesco.cons|liga.vitória.cons/i,'Financeiro'],
  [/porto.seguro|travelex|mobills|bulbe|grupo.dreams|creditas/i,'Financeiro'],
  [/sam.?s.club|carrefour|angeloni|supernosso|baianão/i,'Supermercado'],
  [/booking|decolar|hoteis|kaligo|localiza|movida|unidas|hertz|rental.cars|rentcars|avis|budget|sixt|reservecar|tripchip|agaxtur|beach.park.hosp|hope.resort|viajar/i,'Viagem'],
  [/farmácias.app|drogaria|drogarias.pacheco/i,'Farmácia'],
  [/petlove|petz|zee.dog|cobasi/i,'Pet'],
  [/shopee|magalu|magazine.luiza|mercado.livre|q.compra|aliexpress|kabum|fast.shop/i,'Marketplace'],
  [/claro|tim\b/i,'Telecom'],
  [/asics|centauro|netshoes|decathlon|fila\b|nike|umbro|puma|speedo|olympikus|mizuno|new.balance|under.armour|adidas/i,'Esportes'],
  [/sephora|boticário|granado|forever.liss|adcos|amobeleza|beleza.na.web|eudora|avon|natura|oceane|shiseido|nars|truss|vult|quem.disse|abelha.rainha|época.cosm|loccitane/i,'Beleza'],
  [/casas.bahia|extra\b|ponto\b|kabum|acer|electrolux|gazin|midea|brastemp|consul|cook|dufrio/i,'Eletrônicos'],
  [/renner|riachuelo|c.?&.?a\b|cea\b|colcci|converse|crocs|dudalina|ellus|havaianas|hering|hope\b|individual\b|john.john|lacoste|le.lis|live!|malwee|osklen|posthaus|puket|reserva\b|zattini|bobstore|beyoung|dafiti|shoestock|meia.sola|guess|bibi|democrata|estoque\b|elbo\b|morana|yvy|zissou|foco\b|bo\.bô|bobo|loungerie|vivara/i,'Moda'],
  [/camicado|imaginarium|bombay|pado|maltacor/i,'Casa'],
  [/globoplay|cinemark|seus.ingressos|playstation|beto.carrero|coliseu/i,'Entretenimento'],
  [/coffee.mais|assinatura.coffee|café.orf|tia.sônia|outback|mistral|bombay|piatan|cestas/i,'Alimentação'],
  [/samsonite|bagaggio|thule\b|tripchip/i,'Viagem'],
  [/uber|buser|clickbus/i,'Transporte'],
  [/loja.do.mec|pneustore|postos.ale/i,'Automotivo'],
  [/lego|carters/i,'Infantil'],
  [/vivara|monte.carlo|technos|fóssil|seculus|mondaine/i,'Acessórios'],
  [/pura.vida|beep\b|medsênior|max.titanium|probiótica|wise.up|alura/i,'Saúde'],
  [/edp\b|home.angels/i,'Serviços'],
];
const CAT_ICONS={'Marketplace':'🛒','Eletrônicos':'💻','Moda':'👗','Beleza':'💄','Viagem':'✈️','Esportes':'🏅','Farmácia':'💊','Supermercado':'🛍️','Pet':'🐾','Telecom':'📱','Casa':'🏠','Alimentação':'☕','Entretenimento':'🎬','Seguros':'🛡️','Financeiro':'💰','Acessórios':'⌚','Saúde':'🏋️','Lazer':'🎡','Transporte':'🚌','Automotivo':'🔧','Infantil':'🧸','Serviços':'⚙️','Outros':'📦'};
function categorize(n){for(const[re,c]of CAT_RULES)if(re.test(n))return c;return'Outros';}

// ─── Parser — suporta múltiplos formatos da Comparemania ─────────────────────
function extractPts(g){
  // Livelo/Esfera: "= 5 ponto(s) por 1 real" ou "até 84 ponto(s) por 1 real"
  const ate=g.match(/até\s+(\d+)/i);
  const eq=g.match(/=\s+(\d+)/i);
  // Azul: "5 pt/R$" ou "4,5 pt/R$"
  const azul=g.match(/(\d+[,.]?\d*)\s*pt\//i);
  // LATAM: "Cada 1 real gastos = 3 ponto(s) Latam Pass"
  const latam=g.match(/=\s*(\d+)\s*ponto/i);
  // Smiles: "você ganha até 26 Smiles"
  const smiles=g.match(/ganha\s+(?:até\s+)?(\d+)\s+smiles/i);
  const raw=ate||eq||latam||smiles||azul;
  if(!raw) return null;
  const pts=parseFloat((raw[1]||'').replace(',','.'));
  return {pts:Math.round(pts)||pts, ate:!!(ate||smiles)};
}

function parseHTML(html, progId){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const out=[];
  doc.querySelectorAll('table tr').forEach(tr=>{
    const td=tr.querySelectorAll('td');
    if(td.length<2)return;
    const na=td[0].querySelector('a'),ga=td[1].querySelector('a');
    if(!na||!ga)return;
    const name=na.textContent.trim(),g=ga.textContent.trim();
    const parsed=extractPts(g);
    if(!parsed||!name)return;
    const {pts,ate}=parsed;
    const pm=g.match(/por\s+(\d+)\s+real/i);
    const dollar=/u\$|dólar|dollar|kaligo|hertz|decolar|aliexpress|rental.cars|rentcars|localiza.int/i.test(g+name);
    const rawHref=na.getAttribute("href")||"#";
    const url=rawHref.startsWith("http")?rawHref:"https://www.comparemania.com.br"+rawHref;
    out.push({name,pts,per:pm?+pm[1]:1,ate,dollar,cat:categorize(name),url,prog:progId});
  });
  return out;
}

// ─── Merge: maior pts por parceiro ───────────────────────────────────────────
function mergePartners(allData){
  const map={};
  for(const [progId, items] of Object.entries(allData)){
    for(const p of items){
      const key=p.name.toLowerCase().trim();
      if(!map[key]){
        map[key]={name:p.name,cat:p.cat,dollar:p.dollar,ate:p.ate,per:p.per,programs:{}};
      }
      map[key].programs[progId]={pts:p.pts,ate:p.ate,per:p.per,url:p.url};
      // mantém dollar/ate se qualquer programa tiver
      if(p.dollar)map[key].dollar=true;
      if(p.ate)map[key].ate=true;
    }
  }
  // calcula melhor programa
  return Object.values(map).map(p=>{
    let bestPts=0,bestProg=null;
    for(const[pid,data] of Object.entries(p.programs)){
      if(data.pts>bestPts){bestPts=data.pts;bestProg=pid;}
      else if(data.pts===bestPts&&bestProg)bestProg='both';
    }
    return {...p,bestPts,bestProg};
  });
}

// ─── Fetch ────────────────────────────────────────────────────────────────────
async function fetchProg(prog, onLog){
  onLog(`Consultando ${prog.name}…`);
  const res=await fetch(`${PROXY}?url=${encodeURIComponent(prog.url)}`,{signal:AbortSignal.timeout(15000)});
  if(!res.ok) throw new Error(`${prog.name}: servidor retornou ${res.status}`);
  const html=await res.text();
  if(!html.includes('ponto(s)')&&!html.includes('Smiles')&&!html.includes('pt/R$')) throw new Error(`${prog.name}: resposta inesperada`);
  const items=parseHTML(html,prog.id);
  onLog(`${prog.name}: ${items.length} parceiros ✓`);
  return items;
}

// ─── Extrai links diretos da página individual do parceiro ───────────────────
function parseRedirectLinks(html){
  const links={};
  const doc=new DOMParser().parseFromString(html,'text/html');
  // Procura headings h5/h4/h3 com nome do programa e acha link "Ir para loja" no bloco pai
  doc.querySelectorAll('h5,h4,h3').forEach(h=>{
    const progName=h.textContent.trim().toLowerCase();
    if(!/^(livelo|esfera|smiles|latam pass|tudo azul)$/.test(progName)) return;
    let el=h.parentElement;
    for(let i=0;i<8;i++){
      if(!el) break;
      const link=[...el.querySelectorAll('a')].find(a=>{
        const text=a.textContent.trim().toLowerCase();
        const href=a.getAttribute('href')||'';
        return (text.includes('ir para')||text.includes('loja')) && href.includes('redirecionar/oferta');
      });
      if(link){
        const raw=link.getAttribute('href');
        links[progName]=raw.startsWith('http')?raw:'https://www.comparemania.com.br'+raw;
        break;
      }
      el=el.parentElement;
    }
  });
  return links;
}

async function fetchRedirectLinks(partnerUrl){
  try{
    const res=await fetch(`${PROXY}?url=${encodeURIComponent(partnerUrl)}`,{signal:AbortSignal.timeout(12000)});
    if(!res.ok) return {};
    const html=await res.text();
    return parseRedirectLinks(html);
  }catch{return {};}
}

// ─── State ────────────────────────────────────────────────────────────────────
let partners=[],activeCat='all',activeFilters=new Set();

async function loadData(){
  const btn=document.getElementById('refresh-btn');
  btn.disabled=true;btn.textContent='⟳ Buscando…';
  document.getElementById('update-badge').textContent='Buscando…';
  document.getElementById('grid').innerHTML='<div class="status-box"><div class="spinner"></div><div style="color:var(--muted);font-size:13px" id="load-msg">Iniciando consulta…</div></div>';
  document.getElementById('cat-bar').innerHTML='';
  document.getElementById('stats').innerHTML='';

  const log=msg=>{const el=document.getElementById('load-msg');if(el)el.textContent=msg;};

  try{
    // 1. Busca listas dos dois programas
    const allData={};
    for(const prog of PROGRAMS){
      allData[prog.id]=await fetchProg(prog,log);
    }
    partners=mergePartners(allData);
    if(!partners.length) throw new Error('Nenhum parceiro encontrado.');

    // 2. Renderiza imediatamente
    buildCatBar();render();

    const now=new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    document.getElementById('update-badge').innerHTML=`Atualizado em <strong>${now}</strong>`;
  }catch(e){
    document.getElementById('grid').innerHTML=`<div class="error-box">⚠️ ${e.message}</div>`;
    document.getElementById('update-badge').textContent='Erro';
  }finally{
    btn.disabled=false;btn.textContent='⟳ Atualizar';
  }
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function pool(){
  const q=document.getElementById('search').value.toLowerCase();
  return partners.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q)&&!p.cat.toLowerCase().includes(q))return false;
    if(activeCat!=='all'&&p.cat!==activeCat)return false;
    if(activeFilters.has('dollar')&&!p.dollar)return false;
    if(activeFilters.has('ate')&&!p.ate)return false;
    return true;
  });
}

function buildCatBar(){
  const cnt={};partners.forEach(p=>{cnt[p.cat]=(cnt[p.cat]||0)+1;});
  document.getElementById('cat-bar').innerHTML=
    `<button class="cbtn active" data-cat="all">Todas <span class="cc">${partners.length}</span></button>`+
    Object.keys(cnt).sort().map(c=>`<button class="cbtn" data-cat="${c}">${CAT_ICONS[c]||'•'} ${c} <span class="cc">${cnt[c]}</span></button>`).join('');
}

function render(){
  const sort=document.getElementById('sort').value;
  const list=pool().sort((a,b)=>{
    if(sort==='name')return a.name.localeCompare(b.name);
    return sort==='pts_asc'?a.bestPts-b.bestPts:b.bestPts-a.bestPts;
  });

  document.getElementById('stats').innerHTML=
    `<span><span class="sdot" style="background:var(--text)"></span>Total: <strong>${partners.length}</strong></span>`+
    `<span><span class="sdot" style="background:var(--cdv-coral)"></span>Exibindo: <strong>${list.length}</strong></span>`+
    `<span><span class="sdot" style="background:var(--dollar)"></span>Em dólar: <strong>${partners.filter(p=>p.dollar).length}</strong></span>`;

  document.querySelectorAll('.cbtn').forEach(b=>b.classList.toggle('active',b.dataset.cat===activeCat));

  if(!list.length){document.getElementById('grid').innerHTML='<div class="status-box" style="color:var(--muted)">Nenhum parceiro encontrado.</div>';return;}

  const lbl=p=>{
    const bp=p.programs[p.bestProg==='both'?Object.keys(p.programs)[0]:p.bestProg]||{};
    return (bp.per>1)?`R$${bp.per}`:p.dollar?'U$1':'R$1';
  };

  // badges dos programas
  const progBadges=p=>Object.entries(p.programs).map(([pid,d])=>{
    const pr=PROGRAMS.find(x=>x.id===pid);
    return `<span class="pbdg pbdg-${pid}">${pr.name} ${d.pts}</span>`;
  }).join('');

  const winnerClass=p=>p.bestProg==='both'?'winner-both':`winner-${p.bestProg}`;

  document.getElementById('grid').innerHTML=list.map(p=>`
    <div class="card ${winnerClass(p)} ${p.dollar?'is-dollar':''}" data-name="${encodeURIComponent(p.name)}">
      <div class="pname">${p.name}</div>
      <div class="pts-row">
        <span class="pts-val">${p.bestPts}</span>
        <span class="pts-lbl">${p.ate?'pts até/':'pts/'}${lbl(p)}</span>
      </div>
      <div class="prog-badges">${progBadges(p)}</div>
      ${p.dollar?'<span class="tag-dollar">em U$ turismo</span>':''}
      <div class="card-foot">${p.cat}</div>
    </div>`).join('');
}

// ─── Modal ────────────────────────────────────────────────────────────────────
const directUrlCache={};

// Mapa entre IDs internos e nomes usados pela Comparemania nos headings
const PROG_NAME_MAP={azul:'tudo azul','latam':'latam pass',livelo:'livelo',esfera:'esfera',smiles:'smiles'};

function resolveLink(pid, links){
  const key=PROG_NAME_MAP[pid]||pid;
  return links[key]||links[pid]||'';
}

function renderModalRows(p, links={}){
  return Object.entries(p.programs).sort((a,b)=>b[1].pts-a[1].pts).map(([pid,data])=>{
    const prog=PROGRAMS.find(x=>x.id===pid);
    const isBest=data.pts===p.bestPts;
    const lbl=(data.per>1)?`R$${data.per}`:p.dollar?'U$1':'R$1';
    const destUrl=resolveLink(pid,links);
    const loading=!destUrl;
    return `<a class="modal-row ${isBest?'best':''} ${loading?'loading':''}" 
      ${loading?'href="#" onclick="return false;"':`href="${destUrl}" target="_blank"`}
      style="text-decoration:none;color:inherit;cursor:${loading?'not-allowed':'pointer'};opacity:${loading?'0.6':'1'}">
      <div class="modal-prog">
        <div class="modal-prog-dot" style="background:${prog.color}"></div>
        <div>
          <div class="modal-prog-name">${prog.name}</div>
          ${isBest?'<div class="best-badge">✓ Melhor opção</div>':''}
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${loading?'⟳ carregando link…':'↗ Ir para o parceiro'}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div class="modal-pts" style="color:${prog.color}">${data.pts}</div>
        <div class="modal-pts-lbl">${data.ate?'pts até/':'pts/'}${lbl}</div>
      </div>
    </a>`;
  }).join('');
}

async function openModal(name){
  const p=partners.find(x=>x.name===name);
  if(!p)return;

  document.getElementById('modal-name').textContent=p.name;
  document.getElementById('modal-cat').textContent=p.cat;

  // Usa cache se já buscou
  const cached=directUrlCache[name];
  document.getElementById('modal-rows').innerHTML=renderModalRows(p, cached||{});

  const bestPid=p.bestProg==='both'?Object.keys(p.programs)[0]:p.bestProg;
  document.getElementById('modal-url').href=resolveLink(bestPid,cached||{})||p.programs[bestPid]?.url||'#';
  document.getElementById('modal-overlay').classList.add('open');

  // Se ainda não buscou, busca agora
  if(!cached){
    // Usa a URL da página individual (cashback-xxx), preferindo qualquer programa
    const anyProgUrl=Object.values(p.programs)[0]?.url;
    console.log('[CDV] Buscando links para:', name, '| URL:', anyProgUrl);
    if(anyProgUrl){
      const links=await fetchRedirectLinks(anyProgUrl);
      console.log('[CDV] Links encontrados:', JSON.stringify(links));
      directUrlCache[name]=links;
      // Atualiza o modal se ainda estiver aberto para este parceiro
      if(document.getElementById('modal-name').textContent===name){
        document.getElementById('modal-rows').innerHTML=renderModalRows(p,links);
        document.getElementById('modal-url').href=resolveLink(bestPid,links)||p.programs[bestPid]?.url||'#';
      }
    }
  }
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modal-overlay')||e.currentTarget.classList.contains('modal-close')){
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ─── Events ───────────────────────────────────────────────────────────────────
document.addEventListener('click',e=>{
  const fb=e.target.closest('[data-filter]');
  if(fb){const f=fb.dataset.filter;activeFilters.has(f)?activeFilters.delete(f):activeFilters.add(f);fb.classList.toggle('active');render();return;}
  const cb=e.target.closest('[data-cat]');
  if(cb){activeCat=(activeCat===cb.dataset.cat&&cb.dataset.cat!=='all')?'all':cb.dataset.cat;render();return;}
  const card=e.target.closest('.card[data-name]');
  if(card){openModal(decodeURIComponent(card.dataset.name));} // async, fire & forget
});

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal({target:document.getElementById('modal-overlay')});});

loadData();
</script>
