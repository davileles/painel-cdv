<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Ofertas — Clube do Viajante</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
  :root {
    --bg:#1e2535;--surface:#2a3246;--card:#323c54;--border:#3d4a66;
    --text:#eeeeee;--muted:#8a9bbf;--muted2:#5a6a8a;
    --livelo:#df0979;--livelo-dim:rgba(223,9,121,0.15);
    --esfera:#e8371b;--esfera-dim:rgba(232,55,27,0.15);
    --smiles:#f97316;--smiles-dim:rgba(249,115,22,0.15);
    --azul:#0ea5e9;--azul-dim:rgba(14,165,233,0.15);
    --latam:#dc2626;--latam-dim:rgba(220,38,38,0.15);
    --green:#34d399;--dollar:#60a5fa;--dollar-dim:rgba(96,165,250,0.12);
    --red:#f87171;--accent:#ff585e;--accent2:#e04449;--blue:#126eff;
    --cdv-navy:#2a3246;--cdv-coral:#ff585e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Montserrat',sans-serif;font-size:14px;min-height:100vh}

  header{background:var(--surface);border-bottom:3px solid var(--accent);padding:14px 22px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo-row{display:flex;align-items:center;gap:14px}
  .logo-bird{width:52px;height:52px;flex-shrink:0;object-fit:contain}
  .brand{display:flex;flex-direction:column;gap:2px}
  .brand-name{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.3px;line-height:1.1}
  .brand-sub{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
  .refresh-btn{background:var(--cdv-coral);border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;transition:opacity .2s}
  .refresh-btn:hover{opacity:.85}
  .refresh-btn:disabled{opacity:.5;cursor:not-allowed}
  .prog-bar{padding:8px 22px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg)}
  .prog-fbtn{border:1px solid;background:var(--surface);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all .15s;opacity:.4}
  .prog-fbtn.active{opacity:1;background:var(--card)}
  .prog-fbtn:hover{opacity:.85}

  .controls{padding:10px 22px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:80px;z-index:99}
  input[type=text]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px;font-family:'Montserrat',sans-serif;width:210px;outline:none;transition:border-color .2s}
  input[type=text]:focus{border-color:var(--cdv-coral)}
  input[type=text]::placeholder{color:var(--muted)}
  .fbtn{border:1px solid var(--border);background:transparent;color:var(--muted);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif;white-space:nowrap;transition:all .15s}
  .fbtn:hover{color:var(--text);border-color:var(--cdv-coral)}
  .fbtn.active{background:rgba(255,88,94,.12);border-color:var(--cdv-coral);color:var(--cdv-coral)}
  select.srt{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-size:12px;font-family:'Montserrat',sans-serif;cursor:pointer;outline:none}

  .cat-bar{padding:8px 22px 10px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
  .cbtn{border:1px solid var(--border);background:transparent;color:var(--muted);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s}
  .cbtn:hover{border-color:var(--text);color:var(--text)}
  .cbtn.active{background:rgba(255,88,94,.12);border-color:var(--cdv-coral);color:var(--cdv-coral)}
  .cbtn .cc{background:var(--border);border-radius:4px;padding:1px 5px;font-size:10px;color:var(--muted);font-weight:700}
  .cbtn.active .cc{background:var(--cdv-coral);color:#fff}

  .stats{display:flex;gap:18px;padding:9px 22px;border-bottom:1px solid var(--border);flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .stats strong{color:var(--text);font-size:14px;font-weight:700}
  .sdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;padding:18px 22px}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
  .card:hover{transform:translateY(-2px)}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
  .card.winner-livelo::before{background:var(--livelo)}
  .card.winner-esfera::before{background:var(--esfera)}
  .card.winner-smiles::before{background:var(--smiles)}
  .card.winner-azul::before{background:var(--azul)}
  .card.winner-latam::before{background:var(--latam)}
  .card.winner-both::before{background:linear-gradient(90deg,var(--cdv-coral),#f97316)}
  .card.winner-livelo:hover{border-color:var(--livelo)}
  .card.winner-esfera:hover{border-color:var(--esfera)}
  .card.winner-smiles:hover{border-color:var(--smiles)}
  .card.winner-azul:hover{border-color:var(--azul)}
  .card.winner-latam:hover{border-color:var(--latam)}
  .card.winner-both:hover{border-color:var(--cdv-coral)}
  .card.is-dollar:hover{border-color:var(--dollar)}

  .pname{font-size:13px;font-weight:700;line-height:1.3}
  .fire-badge{font-size:9px;font-weight:800;background:rgba(251,146,60,.15);color:#fb923c;border:1px solid rgba(251,146,60,.4);border-radius:4px;padding:1px 5px;width:fit-content;margin-bottom:2px}
  .pts-row{display:flex;align-items:baseline;gap:4px}
  .pts-val{font-size:26px;font-weight:900;line-height:1}
  .winner-livelo .pts-val{color:var(--livelo)}
  .winner-esfera .pts-val{color:var(--esfera)}
  .winner-smiles .pts-val{color:var(--smiles)}
  .winner-azul .pts-val{color:var(--azul)}
  .winner-latam .pts-val{color:var(--latam)}
  .winner-both .pts-val{color:var(--cdv-coral)}
  .pts-lbl{font-size:11px;color:var(--muted)}
  .pts-ate{font-size:9px;font-weight:600;color:var(--muted);line-height:1;margin-bottom:1px}

  .prog-badges{display:flex;gap:4px;flex-wrap:wrap}
  .pbdg{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap}
  .pbdg-livelo{background:var(--livelo-dim);color:var(--livelo);border:1px solid rgba(223,9,121,.3)}
  .pbdg-esfera{background:var(--esfera-dim);color:var(--esfera);border:1px solid rgba(232,55,27,.3)}
  .pbdg-smiles{background:var(--smiles-dim);color:var(--smiles);border:1px solid rgba(249,115,22,.3)}
  .pbdg-azul{background:var(--azul-dim);color:var(--azul);border:1px solid rgba(14,165,233,.3)}
  .pbdg-latam{background:var(--latam-dim);color:var(--latam);border:1px solid rgba(220,38,38,.3)}

  .tag-dollar{background:var(--dollar-dim);border:1px solid rgba(96,165,250,.2);border-radius:5px;padding:2px 7px;font-size:10px;color:var(--dollar);font-weight:600;width:fit-content}
  .card-foot{margin-top:auto;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  /* STATUS */
  .status-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;grid-column:1/-1;text-align:center}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--cdv-coral);border-radius:50%;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:16px 20px;color:var(--red);font-size:13px;grid-column:1/-1;text-align:center;line-height:1.8}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:420px;width:100%;position:relative}
  .modal-close{position:absolute;top:14px;right:16px;background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
  .modal-close:hover{color:var(--text)}
  .modal-name{font-size:18px;font-weight:800;margin-bottom:4px}
  .modal-cat{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:20px}
  .modal-rows{display:flex;flex-direction:column;gap:10px}
  #hist-chart{height:200px!important}
  .modal-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s,background .15s}
  .modal-row:hover{background:var(--card);border-color:var(--muted)}
  .modal-row.best:hover{border-color:var(--cdv-coral);background:#1f1f38}
  .modal-row.best{border-color:var(--cdv-coral)}
  .modal-prog{display:flex;align-items:center;gap:8px}
  .modal-prog-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .modal-prog-name{font-size:13px;font-weight:600}
  .modal-pts{font-size:22px;font-weight:900}
  .modal-pts-lbl{font-size:11px;color:var(--muted);margin-top:1px;text-align:right}
  .best-badge{font-size:10px;font-weight:700;color:var(--cdv-coral);margin-top:4px}
  .modal-url{display:block;margin-top:16px;text-align:center;font-size:12px;color:var(--cdv-coral);background:transparent;cursor:pointer;padding:10px;border:1px solid rgba(255,88,94,.3);border-radius:8px;transition:background .15s;font-family:'Montserrat',sans-serif;font-weight:700;width:100%}
  .modal-url:hover{background:rgba(255,88,94,.08)}

  @media(max-width:600px){
    header,.controls{padding:10px 14px}
    .cat-bar,.stats{padding:8px 14px}
    .grid{padding:14px;gap:9px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
    input[type=text]{width:100%}
    
    .controls{top:72px}
  }
  /* ── Alertas ── */
  .modal-alert-form{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:14px}
  .modal-alert-form label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
  .modal-alert-form input,.modal-alert-form select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;padding:8px 10px;margin-bottom:10px;outline:none}
  .modal-alert-form input:focus,.modal-alert-form select:focus{border-color:var(--cdv-coral)}
  .btn-alerta{width:100%;padding:10px;background:transparent;border:1px solid rgba(255,88,94,.4);color:var(--cdv-coral);border-radius:8px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:2px}
  .btn-alerta:hover{background:rgba(255,88,94,.08)}
  .alerta-fb{font-size:12px;font-weight:700;text-align:center;min-height:16px;margin-top:8px}

  /* ── Abas principais ─────────────────────────────────────────────────────── */
  .main-tabs{display:flex;gap:0;padding:0 22px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:81px;z-index:90}
  .main-tab{background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;padding:14px 18px;cursor:pointer;transition:color .15s,border-color .15s}
  .main-tab:hover{color:var(--text)}
  .main-tab.active{color:var(--cdv-coral);border-bottom-color:var(--cdv-coral)}
  .tab-panel{display:block}

  /* ── Radar de Ofertas ────────────────────────────────────────────────────── */
  .radar-bar{display:none}
  .radar-title{font-size:12px;color:var(--muted);font-weight:600}
  .oferta-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:border-color .15s,transform .15s;position:relative}
  .oferta-card.encerrada{opacity:.45}
  .oferta-card.encerrada:hover{opacity:.7}
  .oferta-encerrada-badge{display:inline-block;font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:rgba(248,113,113,.18);color:#f87171;padding:2px 7px;border-radius:5px;white-space:nowrap}
  #oferta-modal-titulo.encerrada-titulo{opacity:.7}
  .oferta-card:hover{border-color:var(--cdv-coral);transform:translateY(-2px)}
  .oferta-card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .oferta-emoji{font-size:22px;line-height:1}
  .oferta-cat-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:6px;background:rgba(255,88,94,.12);color:var(--cdv-coral);white-space:nowrap}
  .oferta-titulo{font-size:14px;font-weight:800;line-height:1.3}
  .oferta-resumo-mini{font-size:11px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .oferta-card-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:auto;padding-top:6px;border-top:1px solid var(--border)}
  .oferta-prazo-mini{font-size:10px;color:#f97316;font-weight:700}
  .oferta-data-mini{font-size:10px;color:var(--muted2)}
  .oferta-modal{max-width:680px;max-height:85vh;overflow-y:auto}
  .oferta-modal-emoji{font-size:30px;margin-bottom:6px}
  .oferta-modal-section{font-size:13px;color:var(--text);line-height:1.55;margin-top:6px}
  .oferta-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
  .oferta-fato{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
  .oferta-fato-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
  .oferta-fato-val{font-size:13px;font-weight:800;color:var(--text);margin-top:2px}
  .oferta-modal-restricoes{margin-top:14px}
  .oferta-modal-restricoes ul{margin:6px 0 0 0;padding-left:18px;display:flex;flex-direction:column;gap:4px;list-style-position:outside}
  .oferta-modal-restricoes li{font-size:12px;color:var(--muted);line-height:1.4}
  .oferta-importante{margin-top:14px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:10px 12px;font-size:11px;color:#fb923c;line-height:1.5}

  .radar-search-wrap{padding:10px 22px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .radar-search{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px;font-family:'Montserrat',sans-serif;width:210px;outline:none;transition:border-color .2s}
  .radar-search:focus{border-color:var(--cdv-coral)}
  .radar-search::placeholder{color:var(--muted)}

  /* ── Aba Passagens ─────────────────────────────────────────────────────────── */
  .passagens-controls{padding:10px 22px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg)}
  .passagens-search{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px;font-family:'Montserrat',sans-serif;width:210px;outline:none;transition:border-color .2s}
  .passagens-search:focus{border-color:var(--cdv-coral)}
  .passagens-search::placeholder{color:var(--muted)}
  .pass-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;cursor:default;transition:border-color .15s,transform .15s;position:relative}
  .pass-card:hover{transform:translateY(-2px);border-color:var(--cdv-coral)}
  .pass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cdv-coral);border-radius:12px 12px 0 0}
  .pass-rota{font-size:15px;font-weight:800;color:var(--text);line-height:1.2}
  .pass-rota span{color:var(--cdv-coral)}
  .pass-pts{font-size:26px;font-weight:900;color:var(--cdv-coral);line-height:1}
  .pass-pts-lbl{font-size:11px;color:var(--muted)}
  .pass-info{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
  .pass-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--card);border:1px solid var(--border);color:var(--muted)}
  .pass-datas{font-size:11px;color:var(--muted);line-height:1.4;margin-top:2px}
  .pass-datas strong{color:var(--text-secondary);font-size:10px;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:2px}
  .pass-hist{margin-top:6px;padding-top:8px;border-top:1px solid var(--border)}
  .pass-hist-titulo{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .pass-hist-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;padding:2px 0}
  .pass-hist-melhor{color:#34d399;font-weight:700}
  .pass-hist-pior{color:#f87171;font-weight:700}
  .pass-hist-igual{color:var(--muted)}
  .pass-excluir{position:absolute;top:10px;right:10px;background:transparent;border:none;color:var(--muted2);font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;transition:color .15s}
  .pass-excluir:hover{color:#f87171}
  .pass-fonte{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:1px 6px;border-radius:3px;width:fit-content}
  .pass-fonte-emissao{background:rgba(18,110,255,.15);color:#126eff}
  .pass-fonte-alerta{background:rgba(249,115,22,.15);color:#f97316}
  @media(max-width:640px){
    .main-tabs{top:73px;padding:0 10px}
    .main-tab{padding:12px 12px;font-size:12px}
    .radar-bar{padding:12px 14px 0}
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<header>
  <div class="logo-row">
    <img class="logo-bird" src="logocdv.png" onerror="this.style.display='none'" alt="Clube do Viajante"/>
    <div class="brand">
      <span class="brand-name">Clube do Viajante</span>
      <span class="brand-sub">Painel de ofertas</span>
    </div>
  </div>
</header>

<div class="main-tabs" id="main-tabs">
  <button class="main-tab active" data-tab="comparador">🏆 Comparador de Pontos</button>
  <button class="main-tab" data-tab="radar">📡 Radar de Ofertas</button>
  <button class="main-tab" data-tab="passagens">✈️ Passagens</button>
</div>

<div id="tab-comparador" class="tab-panel">
<div class="controls">
  <input type="text" id="search" placeholder="Buscar parceiro ou categoria…" oninput="render()">
  <select class="srt" id="sort" onchange="render()">
    <option value="pts_desc">Maior pontuação</option>
    <option value="pts_asc">Menor pontuação</option>
    <option value="name">A → Z</option>
  </select>
</div>

<div class="prog-bar" id="prog-filters-bar"></div>
<div class="cat-bar" id="cat-bar"></div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid">
  <div class="status-box"><div class="spinner"></div><div style="color:var(--muted);font-size:13px">Buscando parceiros…</div></div>
</div>
</div>

<div id="tab-radar" class="tab-panel" style="display:none">
  <div class="radar-search-wrap"><input type="text" class="radar-search" id="radar-search" placeholder="Buscar oferta…" oninput="renderOfertas()"></div>
  <div class="cat-bar" id="radar-cat-bar"></div>
  <div class="grid" id="radar-grid">
    <div class="status-box"><div class="spinner"></div><div style="color:var(--muted);font-size:13px">Carregando ofertas…</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close-btn">×</button>
    <div class="modal-name" id="modal-name"></div>

<script>
const PROXY = 'https://cdv-proxy-production.up.railway.app/fetch';
const PROGRAMS = [

const CAT_RULES=[
  [/seguro.*(viagem|travel|vida|residencial|celular|auto|moto|odonto)/i,'Seguros'],

  [/casas.bahia|extra\b|ponto\b|kabum|acer|electrolux|gazin|midea|brastemp|consul|cook|dufrio/i,'Eletrônicos'],
  [/renner|riachuelo|c.?&.?a\b|cea\b|colcci|converse|crocs|dudalina|ellus|havaianas|hering|hope\b|individual\b|john.john|lacoste|le.lis|live!|malwee|osklen|posthaus|puket|reserva\b|zattini|bobstore|beyoung|dafiti|shoestock|meia.sola|guess|bibi|democrata|estoque\b|elbo\b|morana|yvy|zissou|foco\b|bo\.bô|bobo|loungerie|vivara/i,'Moda'],
  [/camicado|imaginarium|bombay|pado|maltacor/i,'Casa'],
  [/globoplay|cinemark|seus.ingressos|playstation|beto.carrero|coliseu/i,'Entretenimento'],
  [/coffee.mais|assinatura.coffee|café.orf|tia.sônia|outback|mistral|bombay|piatan|cestas/i,'Alimentação'],

  [/edp\b|home.angels/i,'Serviços'],
];
const CAT_ICONS={'Marketplace':'🛒','Eletrônicos':'💻','Moda':'👗','Beleza':'💄','Viagem':'✈️','Esportes':'🏅','Farmácia':'💊','Supermercado':'🛍️','Pet':'🐾','Telecom':'📱','Casa':'🏠','Alimentação':'☕','Entretenimento':'🎬','Seguros':'🛡️','Financeiro':'💰','Acessórios':'⌚','Saúde':'🏋️','Lazer':'🎡','Transporte':'🚌','Automotivo':'🔧','Infantil':'🧸','Serviços':'⚙️','Outros':'📦'};
function categorize(n){for(const[re,c]of CAT_RULES)if(re.test(n))return c;return'Outros';}

function extractPts(g){
  const ate=g.match(/até\s+(\d+)/i);
  const eq=g.match(/=\s+(\d+)/i);
  const azul=g.match(/(\d+[,.]?\d*)\s*pt\//i);
  const latam=g.match(/=\s*(\d+)\s*ponto/i);
  const smiles=g.match(/ganha\s+(?:até\s+)?(\d+)\s+smiles/i);
  const raw=ate||eq||latam||smiles||azul;
  if(!raw) return null;
  const pts=parseFloat((raw[1]||'').replace(',','.'));
  return {pts:Math.round(pts)||pts, ate:!!(ate||smiles)};
}

function parseHTML(html, progId){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const out=[];
  doc.querySelectorAll('table tr').forEach(tr=>{
    const td=tr.querySelectorAll('td');
    if(td.length<2)return;
    const na=td[0].querySelector('a'),ga=td[1].querySelector('a');
    if(!na||!ga)return;
    const name=na.textContent.trim(),g=ga.textContent.trim();
    const parsed=extractPts(g);
    if(!parsed||!name)return;
    const {pts,ate}=parsed;
    const pm=g.match(/por\s+(\d+)\s+real/i);
    const dollar=/u\$|dólar|dollar|kaligo|hertz|decolar|aliexpress|rental.cars|rentcars|localiza.int/i.test(g+name);
    const rawHref=na.getAttribute("href")||"#";
    const url=rawHref.startsWith("http")?rawHref:"https://www.comparemania.com.br"+rawHref;
    out.push({name,pts,per:pm?+pm[1]:1,ate,dollar,cat:categorize(name),url,prog:progId});
  });
  return out;
}

const EQUIV={livelo:1,esfera:1,smiles:1/1.8,azul:1/1.9,latam:1/1.25};

let historico={};

async function carregarHistorico(){
  try{
    const r=await fetch('historico.json',{cache:'no-cache'});
    if(!r.ok) return;
    historico=await r.json();
    console.log('[CDV] Histórico carregado:',Object.keys(historico).length,'dias');
  }catch(e){console.log('[CDV] historico.json não encontrado ainda');}
}

function decodeHistKey(s){
  return (s||'')
    .replace(/&#x([0-9a-f]+);/gi,(_,h)=>String.fromCharCode(parseInt(h,16)))
    .replace(/&#(\d+);/g,(_,d)=>String.fromCharCode(+d))
    .replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&nbsp;/g,' ').replace(/&#0?39;/g,"'")
    .toLowerCase().trim();
}

function mediaHistorica(partnerKey){
  const hoje=new Date().toISOString().split('T')[0];
  const vals=[];
  for(const[data,snap] of Object.entries(historico)){
    if(data===hoje) continue;
    // tenta chave normal e chave decodificada
    const entry=snap[partnerKey]||snap[decodeHistKey(partnerKey)];
    if(!entry) continue;
    let bestEquiv=0;
    for(const[pid,pts] of Object.entries(entry.programs||{})){
      const eq=pts*(EQUIV[pid]||1);
      if(eq>bestEquiv) bestEquiv=eq;
    }
    if(bestEquiv>0) vals.push(bestEquiv);
  }
  if(!vals.length) return null;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}

function isAboveAverage(p){
  const key=p.name.toLowerCase().trim();
  const media=mediaHistorica(key);
  if(media===null) return false;
  let bestEquiv=0;
  for(const[pid,data] of Object.entries(p.programs)){
    const eq=data.pts*(EQUIV[pid]||1);
    if(eq>bestEquiv) bestEquiv=eq;
  }
  return bestEquiv >= media*1.2;
}

function mergePartners(allData){
  const map={};
  for(const [progId, items] of Object.entries(allData)){
    for(const p of items){
      const key=p.name.toLowerCase().trim();
      if(!map[key]){
        map[key]={name:p.name,cat:p.cat,dollar:p.dollar,ate:p.ate,per:p.per,programs:{}};
      }
      map[key].programs[progId]={pts:p.pts,ate:p.ate,per:p.per,url:p.url};
      if(p.dollar)map[key].dollar=true;
      if(p.ate)map[key].ate=true;
    }
  }
  const BASE_PROGS = ['livelo','esfera'];
  const AERIAL_PROGS = ['smiles','azul','latam'];

  return Object.values(map).map(p=>{
    let bestBaseEquiv=0, bestBasePts=0, bestBaseProg=null;
    for(const pid of BASE_PROGS){
      const data=p.programs[pid];
      if(!data) continue;
      const equiv=data.pts*(EQUIV[pid]||1);
      if(equiv>bestBaseEquiv){bestBaseEquiv=equiv;bestBasePts=data.pts;bestBaseProg=pid;}
      else if(equiv===bestBaseEquiv&&bestBaseProg){bestBaseProg='both';bestBasePts=Math.max(bestBasePts,data.pts);}
    }

    let bestAerialEquiv=0, bestAerialPts=0, bestAerialProg=null;
    for(const pid of AERIAL_PROGS){
      const data=p.programs[pid];
      if(!data) continue;
      const equiv=data.pts*(EQUIV[pid]||1);
      if(equiv>bestAerialEquiv){bestAerialEquiv=equiv;bestAerialPts=data.pts;bestAerialProg=pid;}
    }

    if(bestAerialProg && bestAerialEquiv > bestBaseEquiv){
      return {...p, bestPts:bestAerialPts, bestProg:bestAerialProg};
    }

    if(bestBaseProg){
      return {...p, bestPts:bestBasePts, bestProg:bestBaseProg};
    }

    return {...p, bestPts:bestAerialPts||0, bestProg:bestAerialProg};
  });
}

async function fetchProg(prog, onLog){
  onLog(`Consultando ${prog.name}…`);
  const res=await fetch(`${PROXY}?url=${encodeURIComponent(prog.url)}`,{signal:AbortSignal.timeout(15000)});
  if(!res.ok) throw new Error(`${prog.name}: servidor retornou ${res.status}`);
  const html=await res.text();
  const hasKnownText = html.includes('ponto')||html.includes('PONTOS')||html.includes('pt/R$')||/=\s*\d+\s*PONTOS?/i.test(html);
  const hasTable = /<table[\s\S]*?<tr/i.test(html);
  if(!hasKnownText && !hasTable){
    const snippet = html.replace(/\s+/g,' ').trim().slice(0,200);
    onLog(`${prog.name}: resposta inesperada (len=${html.length}) — início: "${snippet}"`);
    throw new Error(`${prog.name}: resposta inesperada (len=${html.length})`);
  }
  const items=parseHTML(html,prog.id);
  if(items.length===0){
    onLog(`${prog.name}: 0 parceiros encontrados — verifique formato da página (len=${html.length})`);
  }
  onLog(`${prog.name}: ${items.length} parceiros ✓`);
  return items;
}

function parseRedirectLinks(html){
  const links={};
  const doc=new DOMParser().parseFromString(html,'text/html');
  doc.querySelectorAll('h5,h4,h3').forEach(h=>{
    const progName=h.textContent.trim().toLowerCase();
    if(!/^(livelo|esfera|smiles|latam pass|tudo azul)$/.test(progName)) return;
    let el=h.parentElement;
    for(let i=0;i<8;i++){
      if(!el) break;
      const link=[...el.querySelectorAll('a')].find(a=>{
        const text=a.textContent.trim().toLowerCase();
        const href=a.getAttribute('href')||'';
        return (text.includes('ir para')||text.includes('loja')) && href.includes('redirecionar/oferta');
      });
      if(link){
        const raw=link.getAttribute('href');
        links[progName]=raw.startsWith('http')?raw:'https://www.comparemania.com.br'+raw;
        break;
      }
      el=el.parentElement;
    }
  });
  return links;
}

async function fetchRedirectLinks(partnerUrl){
  try{
    const res=await fetch(`${PROXY}?url=${encodeURIComponent(partnerUrl)}`,{signal:AbortSignal.timeout(12000)});
    if(!res.ok) return {};
    const html=await res.text();
    const redirectLinks=parseRedirectLinks(html);

    const resolved={};
    await Promise.all(Object.entries(redirectLinks).map(async([prog,redirectUrl])=>{
      try{
        const r=await fetch(`${PROXY}?url=${encodeURIComponent(redirectUrl)}`,{signal:AbortSignal.timeout(10000)});
        if(!r.ok){resolved[prog]=redirectUrl;return;}
        const rhtml=await r.text();
        const doc=new DOMParser().parseFromString(rhtml,'text/html');
        let direct=[...doc.querySelectorAll('a[href]')]
          .map(a=>a.getAttribute('href'))
          .find(h=>h&&h.startsWith('http')&&!h.includes('comparemania'));
        if(!direct){
          const m=rhtml.match(/https?:\/\/[^"'\s<>]*(?:esfera\.com|livelo\.com|smiles\.com\.br|viajemais\.voeazul|latamairlines)[^"'\s<>]*/i);
          if(m) direct=m[0].replace(/\\u0026/g,'&').replace(/\\u002B/g,'+').replace(/\\u002F/g,'/');
        }
        resolved[prog]=direct||redirectUrl;
      }catch{resolved[prog]=redirectUrl;}
    }));
    return resolved;
  }catch{return {};}
}

let partners=[],activeCat='all',activeFilters=new Set(),activeProgs=null;

async function loadData(){
  document.getElementById('grid').innerHTML='<div class="status-box"><div class="spinner"></div><div style="color:var(--muted);font-size:13px" id="load-msg">Iniciando consulta…</div></div>';
  document.getElementById('cat-bar').innerHTML='';
  document.getElementById('stats').innerHTML='';

  const log=msg=>{const el=document.getElementById('load-msg');if(el)el.textContent=msg;};

  try{
    const allData={};
    for(const prog of PROGRAMS){
      allData[prog.id]=await fetchProg(prog,log);
    }
    partners=mergePartners(allData);
    if(!partners.length) throw new Error('Nenhum parceiro encontrado.');

    await carregarHistorico();
    buildCatBar();buildProgFilters();render();

  }catch(e){
    document.getElementById('grid').innerHTML=`<div class="error-box">⚠️ ${e.message}</div>`;
  }
}

function pool(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=partners.filter(p=>{
    if(q&&!p.name.toLowerCase().includes(q)&&!p.cat.toLowerCase().includes(q))return false;
    if(activeCat!=='all'&&p.cat!==activeCat)return false;
    if(activeProgs!==null&&!Object.keys(p.programs).some(pid=>activeProgs.has(pid)))return false;
    return true;
  });
  const BASE=['livelo','esfera'], AERIAL=['smiles','azul','latam'];
  return filtered.map(p=>{
    const activeEntries=activeProgs===null?Object.entries(p.programs):Object.entries(p.programs).filter(([pid])=>activeProgs.has(pid));
    if(!activeEntries.length) return p;
    const activeMap=Object.fromEntries(activeEntries);

    let bestBaseEquiv=0,bestBasePts=0,bestBaseProg=null;
    for(const pid of BASE){
      if(!activeMap[pid]) continue;
      const eq=activeMap[pid].pts*(EQUIV[pid]||1);
      if(eq>bestBaseEquiv){bestBaseEquiv=eq;bestBasePts=activeMap[pid].pts;bestBaseProg=pid;}
      else if(eq===bestBaseEquiv&&bestBaseProg){bestBaseProg='both';bestBasePts=Math.max(bestBasePts,activeMap[pid].pts);}
    }

    let bestAerialEquiv=0,bestAerialPts=0,bestAerialProg=null;
    for(const pid of AERIAL){
      if(!activeMap[pid]) continue;
      const eq=activeMap[pid].pts*(EQUIV[pid]||1);
      if(eq>bestAerialEquiv){bestAerialEquiv=eq;bestAerialPts=activeMap[pid].pts;bestAerialProg=pid;}
    }

    if(bestAerialProg&&bestAerialEquiv>bestBaseEquiv) return {...p,bestPts:bestAerialPts,bestProg:bestAerialProg};
    if(bestBaseProg) return {...p,bestPts:bestBasePts,bestProg:bestBaseProg};
    return {...p,bestPts:bestAerialPts||0,bestProg:bestAerialProg};
  });
}

function buildProgFilters(){
  const el=document.getElementById('prog-filters-bar');
  if(!el) return;
  el.innerHTML=PROGRAMS.map(pr=>`
    <button class="prog-fbtn" data-prog="${pr.id}" style="border-color:${pr.color};color:${pr.color}">
      ${pr.name}
    </button>`).join('');
}

function buildCatBar(){
  const visible=activeProgs===null?partners:partners.filter(p=>Object.keys(p.programs).some(pid=>activeProgs.has(pid)));
  const cnt={};visible.forEach(p=>{cnt[p.cat]=(cnt[p.cat]||0)+1;});
  document.getElementById('cat-bar').innerHTML=
    `<button class="cbtn${activeCat==='all'?' active':''}" data-cat="all">Todas <span class="cc">${visible.length}</span></button>`+
    Object.keys(cnt).sort().map(c=>`<button class="cbtn${activeCat===c?' active':''}" data-cat="${c}">${CAT_ICONS[c]||'•'} ${c} <span class="cc">${cnt[c]}</span></button>`).join('');
}

function render(){
  const sort=document.getElementById('sort').value;
  const list=pool().sort((a,b)=>{
    if(sort==='name')return a.name.localeCompare(b.name);
    return sort==='pts_asc'?a.bestPts-b.bestPts:b.bestPts-a.bestPts;
  });

  document.getElementById('stats').innerHTML=
    `<span><span class="sdot" style="background:var(--text)"></span>Total: <strong>${partners.length}</strong></span>`+
    `<span><span class="sdot" style="background:var(--cdv-coral)"></span>Exibindo: <strong>${list.length}</strong></span>`

  buildCatBar();

  if(!list.length){document.getElementById('grid').innerHTML='<div class="status-box" style="color:var(--muted)">Nenhum parceiro encontrado.</div>';return;}

  const lbl=p=>{
    const bp=p.programs[p.bestProg==='both'?Object.keys(p.programs)[0]:p.bestProg]||{};
    return (bp.per>1)?`R$${bp.per}`:p.dollar?'U$':'R$';
  };

  const progBadges=p=>Object.entries(p.programs).map(([pid,d])=>{
    const pr=PROGRAMS.find(x=>x.id===pid);
    return `<span class="pbdg pbdg-${pid}">${pr.name} ${d.pts}</span>`;
  }).join('');

  const winnerClass=p=>p.bestProg==='both'?'winner-both':`winner-${p.bestProg}`;

  document.getElementById('grid').innerHTML=list.map(p=>`
    <div class="card ${winnerClass(p)} ${p.dollar?'is-dollar':''}" data-name="${encodeURIComponent(p.name)}">
      <div class="pname">${p.name}</div>
      ${isAboveAverage(p)?'<div class="fire-badge">🔥 Acima da média</div>':''}
      ${p.ate?'<div class="pts-ate">até</div>':''}
      <div class="pts-row">
        <span class="pts-val">${p.bestPts}</span>
        <span class="pts-lbl">pts/${lbl(p)}</span>
      </div>
      <div class="prog-badges">${progBadges(p)}</div>
      ${p.dollar?'<span class="tag-dollar">em U$ turismo</span>':''}
      <div class="card-foot">${p.cat}</div>
    </div>`).join('');
}

const directUrlCache={};
const PROG_NAME_MAP={azul:'tudo azul','latam':'latam pass',livelo:'livelo',esfera:'esfera',smiles:'smiles'};

function resolveLink(pid, links){
  const key=PROG_NAME_MAP[pid]||pid;
  return links[key]||links[pid]||'';
}

function renderModalRows(p, links={}){
  // Calcula o melhor equiv real entre todos os programas presentes
  const bestEquivReal = Math.max(...Object.entries(p.programs).map(([pid,d])=>d.pts*(EQUIV[pid]||1)));

  return Object.entries(p.programs).sort((a,b)=>b[1].pts-a[1].pts).map(([pid,data])=>{
    const prog=PROGRAMS.find(x=>x.id===pid);
    const equiv=data.pts*(EQUIV[pid]||1);
    const isBest=Math.abs(equiv-bestEquivReal)<0.01;
    const lbl=(data.per>1)?`R$${data.per}`:p.dollar?'U$':'R$';
    const destUrl=resolveLink(pid,links);
    const linksLoaded=Object.keys(links).length>0;
    const loading=!linksLoaded;
    const unavailable=linksLoaded&&!destUrl;
    if(unavailable) return '';
    return `<a class="modal-row ${isBest?'best':''} ${loading?'loading':''}" 
      ${loading?'href="#" onclick="return false;"':`href="${destUrl}" target="_blank"`}
      style="text-decoration:none;color:inherit;cursor:${loading?'not-allowed':'pointer'};opacity:${loading?'0.6':'1'}">
      <div class="modal-prog">
        <div class="modal-prog-dot" style="background:${prog.color}"></div>
        <div>
          <div class="modal-prog-name">${prog.name}</div>
          ${isBest?'<div class="best-badge">✓ Melhor opção</div>':''}
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${loading?'⟳ carregando link…':'↗ Ir para o parceiro'}</div>
        </div>
      </div>
      <div style="text-align:right">
        ${data.ate?'<div style="font-size:9px;color:var(--muted);margin-bottom:0">até</div>':''}
        <div class="modal-pts" style="color:${prog.color}">${data.pts}</div>
        <div class="modal-pts-lbl">pts/${lbl}</div>
      </div>
    </a>`;
  }).join('');
}

async function openModal(name){
  const p=partners.find(x=>x.name===name);
  if(!p)return;

  currentModalPartner=name;
  const alertForm=document.getElementById('modal-alerta-form');
  if(alertForm){alertForm.style.display='none';}
  const alertFb=document.getElementById('alerta-fb');
  if(alertFb){alertFb.textContent='';}
  const histDiv=document.getElementById('modal-hist');
  const histBtn=document.getElementById('modal-hist-btn');
  if(histDiv){histDiv.style.display='none';}
  if(histBtn){histBtn.textContent='📈 Ver histórico';}
  if(histChart){histChart.destroy();histChart=null;}

  document.getElementById('modal-name').textContent=p.name;
  document.getElementById('modal-cat').textContent=p.cat;

  const cached=directUrlCache[name];
  document.getElementById('modal-rows').innerHTML=renderModalRows(p, cached||{});

  document.getElementById('modal-overlay').classList.add('open');

  if(!cached){
    const anyProgUrl=Object.values(p.programs)[0]?.url;
    console.log('[CDV] Buscando links para:', name, '| URL:', anyProgUrl);
    if(anyProgUrl){
      const links=await fetchRedirectLinks(anyProgUrl);
      console.log('[CDV] Links encontrados:', JSON.stringify(links));
      directUrlCache[name]=links;
      if(document.getElementById('modal-name').textContent===name){
        document.getElementById('modal-rows').innerHTML=renderModalRows(p,links);
      }
    }
  }
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  if(histChart){histChart.destroy();histChart=null;}
  const histDiv=document.getElementById('modal-hist');
  const histBtn=document.getElementById('modal-hist-btn');
  if(histDiv) histDiv.style.display='none';
  if(histBtn) histBtn.textContent='📈 Ver histórico';
}

function renderHistChart(partnerName){
  if(!partnerName) return;
  const key = partnerName.toLowerCase().trim();
  const canvas = document.getElementById('hist-chart');
  const emptyEl = document.getElementById('hist-empty');

  const PROG_COLORS = {
    livelo:'#df0979', esfera:'#e8371b', smiles:'#f97316',
    azul:'#0ea5e9', latam:'#dc2626'
  };
  const PROG_NAMES = {
    livelo:'Livelo', esfera:'Esfera', smiles:'Smiles',
    azul:'Azul', latam:'LATAM Pass'
  };

  const datas = Object.keys(historico).sort();
  if(datas.length < 1){
    canvas.style.display='none';
    emptyEl.style.display='block';
    return;
  }
  canvas.style.display='block';
  emptyEl.style.display='none';

  const ultimos = datas.slice(-180);
  const labels = ultimos.map(d => {
    const [,m,dia] = d.split('-');
    return `${dia}/${m}`;
  });

  const datasets = [];
  for(const [pid, pname] of Object.entries(PROG_NAMES)){
    const vals = ultimos.map(d => {
      const snap = historico[d];
      if(!snap) return null;
      // tenta chave normal e chave decodificada
      const entry = snap[key] || snap[decodeHistKey(key)];
      if(!entry) return null;
      return entry.programs?.[pid] || null;
    });
  const BORDER_DASH = {
    livelo: [],
    esfera: [6,3],
    smiles: [2,2],
    azul:   [10,3],
    latam:  [4,2,1,2],
  };

      if(vals.some(v=>v!==null)){
      datasets.push({
        label: pname,
        data: vals,
        borderColor: PROG_COLORS[pid],
        backgroundColor: PROG_COLORS[pid]+'22',
        borderWidth: 2,
        borderDash: BORDER_DASH[pid]||[],
        segment: { borderDash: ()=>BORDER_DASH[pid]||[] },
        pointRadius: 3,
        pointHoverRadius: 5,
        spanGaps: true,
        tension: 0.3,
      });
    }
  }

  if(!datasets.length){
    canvas.style.display='none';
    emptyEl.style.display='block';
    return;
  }

  if(histChart) { histChart.destroy(); histChart=null; }

  const ctx = canvas.getContext('2d');
  histChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      plugins: {
        legend: {
          labels: {
            color: '#8a9bbf',
            font: { family: 'Montserrat', size: 11 },
            boxWidth: 12, padding: 10
          }
        },
        tooltip: {
          backgroundColor: '#2a3246',
          titleColor: '#eeeeee',
          bodyColor: '#8a9bbf',
          borderColor: '#3d4a66',
          borderWidth: 1,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y ?? '—'} pts/R$`
          }
        }
      },
      scales: {
        x: {
          ticks: { color:'#5a6a8a', font:{family:'Montserrat',size:10}, maxRotation:45 },
          grid: { color:'#3d4a6633' }
        },
        y: {
          ticks: { color:'#5a6a8a', font:{family:'Montserrat',size:10} },
          grid: { color:'#3d4a6633' },
          beginAtZero: false
        }
      }
    }
  });
}

async function salvarAlerta(){
  const email=document.getElementById('alerta-email').value.trim();
  const programa=document.getElementById('alerta-programa').value;
  const minPts=parseInt(document.getElementById('alerta-min-pts').value);
  const fb=document.getElementById('alerta-fb');

  if(!email||!email.includes('@')){fb.style.color='#f87171';fb.textContent='E-mail inválido.';return;}
  if(!minPts||minPts<1){fb.style.color='#f87171';fb.textContent='Informe a pontuação mínima.';return;}

  fb.style.color='var(--muted)';fb.textContent='Salvando…';

  try{
    const endpoint=PROXY.replace('/fetch','/alerta');
    const res=await fetch(endpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,parceiro:currentModalPartner,programa,minPts})
    });
    const data=await res.json();
    if(data.ok){
      fb.style.color='#34d399';
      fb.textContent='✓ Alerta salvo! Você receberá um email quando atingir '+minPts+' pts.';
      document.getElementById('alerta-email').value='';
      document.getElementById('alerta-min-pts').value='';
    } else {
      fb.style.color='#f87171';fb.textContent='Erro: '+(data.erro||'falha ao salvar');
    }
  }catch(e){
    fb.style.color='#f87171';fb.textContent='Erro: '+e.message;
    console.error(e);
  }
}

const PASSAGENS_URL = 'passagens.json';
const CDV_PROXY_PASS = 'https://cdv-proxy-production.up.railway.app';
let passagensData = [];
let passagensLoaded = false;

async function loadPassagens(force) {
  if (passagensLoaded && !force) return;
  const grid = document.getElementById('pass-grid');

function buildPassFiltroPrograma() {

// Agrupa passagens por rota+programa+cabine para comparação histórica
function grupoKey(p) {
  return `${(p.origem||'').toLowerCase()}|${(p.destino||'').toLowerCase()}|${(p.programa||'').toLowerCase()}|${(p.cabine||'').toLowerCase()}`;
}

function renderPassagens() {
  const q = (document.getElementById('pass-search')?.value || '').toLowerCase().trim();
  const progFiltro = document.getElementById('pass-filtro-prog')?.value || '';
  const sort = document.getElementById('pass-sort')?.value || 'recente';

  let items = passagensData.filter(p => {
    if (progFiltro && p.programa !== progFiltro) return false;
    if (q) {
      const haystack = `${p.origem} ${p.destino} ${p.programa} ${p.cia} ${p.cabine}`.toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  items = [...items].sort((a, b) => {
    if (sort === 'pts_asc') return (a.pontos||0) - (b.pontos||0);
    if (sort === 'pts_desc') return (b.pontos||0) - (a.pontos||0);
    return new Date(b.enviadoEm) - new Date(a.enviadoEm);
  });

  // Monta mapa de histórico por grupo (todos os dados, não só os filtrados)
  const histMap = {};
  for (const p of passagensData) {
    const k = grupoKey(p);
    if (!histMap[k]) histMap[k] = [];
    histMap[k].push(p);
  }

  const grid = document.getElementById('pass-grid');
  const stats = document.getElementById('pass-stats');

  stats.innerHTML = `<span><span class="sdot" style="background:var(--text)"></span>Total: <strong>${passagensData.length}</strong></span>` +
    `<span><span class="sdot" style="background:var(--cdv-coral)"></span>Exibindo: <strong>${items.length}</strong></span>`;

  if (!items.length) {
    grid.innerHTML = '<div class="status-box" style="color:var(--muted)">Nenhuma passagem encontrada.</div>';
    return;
  }

  const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  function fmtData(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${String(d.getDate()).padStart(2,'0')} ${MESES[d.getMonth()]}. ${d.getFullYear()}`;
  }

  grid.innerHTML = items.map(p => {
    const k = grupoKey(p);
    const hist = (histMap[k] || []).filter(h => h.id !== p.id).sort((a,b) => new Date(b.enviadoEm) - new Date(a.enviadoEm));
    const anterior = hist[0];

    let histHtml = '';
    if (anterior) {
      const diff = p.pontos - anterior.pontos;
      const pct = anterior.pontos > 0 ? Math.round(Math.abs(diff)/anterior.pontos*100) : 0;
      let cls, icone, txt;
      if (diff < 0) { cls='pass-hist-melhor'; icone='↓'; txt=`${Math.abs(diff).toLocaleString('pt-BR')} pts a menos (${pct}% melhor) vs. ${fmtData(anterior.enviadoEm)}`; }
      else if (diff > 0) { cls='pass-hist-pior'; icone='↑'; txt=`${diff.toLocaleString('pt-BR')} pts a mais (${pct}% pior) vs. ${fmtData(anterior.enviadoEm)}`; }
      else { cls='pass-hist-igual'; icone='='; txt=`Mesma pontuação vs. ${fmtData(anterior.enviadoEm)}`; }
      histHtml = `<div class="pass-hist">
        <div class="pass-hist-titulo">vs. envio anterior</div>
        <div class="pass-hist-item"><span class="${cls}">${icone} ${txt}</span></div>
      </div>`;
    }

    const fonteClass = p.fonte === 'alerta' ? 'pass-fonte-alerta' : 'pass-fonte-emissao';
    const fonteTxt   = p.fonte === 'alerta' ? 'Alerta' : 'Emissão';

    return `<div class="pass-card">
      <button class="pass-excluir" onclick="excluirPassagem('${p.id}')" title="Excluir">×</button>
      <span class="pass-fonte ${fonteClass}">${fonteTxt}</span>
      <div class="pass-rota">${p.origem} <span>→</span> ${p.destino}</div>
      <div style="display:flex;align-items:baseline;gap:4px">
        <span class="pass-pts">${(p.pontos||0).toLocaleString('pt-BR')}</span>
        <span class="pass-pts-lbl">pts</span>
      </div>
      <div class="pass-info">
        ${p.programa ? `<span class="pass-badge">🎟️ ${p.programa}</span>` : ''}
        ${p.cia ? `<span class="pass-badge">✈️ ${p.cia}</span>` : ''}
        ${p.cabine ? `<span class="pass-badge">${p.cabine}</span>` : ''}
      </div>
      ${p.datas_ida ? `<div class="pass-datas"><strong>Ida</strong>${p.datas_ida}</div>` : ''}
      ${p.datas_volta ? `<div class="pass-datas"><strong>Volta</strong>${p.datas_volta}</div>` : ''}
      <div style="font-size:10px;color:var(--muted2);margin-top:2px">${fmtData(p.enviadoEm)}</div>
      ${histHtml}
    </div>`;
  }).join('');
}

async function excluirPassagem(id) {
  if (!confirm('Excluir esta passagem do histórico?')) return;
  try {
    const r = await fetch(CDV_PROXY_PASS + '/passagens/excluir', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id})
    });
    const d = await r.json();
    if (d.ok) {
      passagensData = passagensData.filter(p => p.id !== id);
      renderPassagens();
    } else {
      alert('Erro ao excluir: ' + (d.erro || 'falha'));
    }
  } catch(e) {
    alert('Erro: ' + e.message);
  }
}

function parsePrazoData(s){
  if(!s) return null;
  const txt=s.toLowerCase();
  const meses={janeiro:0,fevereiro:1,'março':2,marco:2,abril:3,maio:4,junho:5,julho:6,agosto:7,setembro:8,outubro:9,novembro:10,dezembro:11};
  let m=txt.match(/(\d{1,2})\s+de\s+([a-zçã]+)\s+de\s+(\d{4})/);
  if(m && meses[m[2]]!=null) return new Date(+m[3], meses[m[2]], +m[1], 23,59,59);
  m=txt.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return new Date(+m[3], +m[2]-1, +m[1], 23,59,59);
  return null;
}

function isOfertaEncerrada(o){
  const d=parsePrazoData(o.prazo);
  if(d) return d.getTime() < Date.now();
  // Sem prazo informado: expira no dia seguinte à publicação
  if(o.publicadoEm){
    const pub=new Date(o.publicadoEm);
    const expira=new Date(pub.getFullYear(), pub.getMonth(), pub.getDate()+1, 23, 59, 59);
    return expira.getTime() < Date.now();
  }
  return false;
}

const MESES_ABREV=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function formatDataPadrao(d){
  const dia=String(d.getDate()).padStart(2,'0');
  return `${dia} ${MESES_ABREV[d.getMonth()]}. de ${d.getFullYear()}`;
}

function formatPrazoLimpo(prazo){
  if(!prazo) return '';
  if(prazo.toLowerCase().trim()==='não informado') return 'não informado';
  const d=parsePrazoData(prazo);
  if(d) return formatDataPadrao(d);
  return prazo
    .replace(/\(?\s*(às|as)?\s*\d{1,2}\s*[h:]\s*\d{2}\s*\)?/gi,'')
    .replace(/\s+/g,' ')
    .trim();
}

function formatPrazoDDMM(prazo){
  if(!prazo) return '';
  const d=parsePrazoData(prazo);
  if(!d) return '';
  const dia=String(d.getDate()).padStart(2,'0');
  const mes=String(d.getMonth()+1).padStart(2,'0');
  return `${dia}/${mes}`;
}

function renderOfertas(){
  const grid=document.getElementById('radar-grid');
  if(!ofertasData||!ofertasData.items||!ofertasData.items.length){
    grid.innerHTML='<div class="status-box"><div style="font-size:30px">📭</div><div style="color:var(--muted);font-size:13px">Nenhuma oferta no radar no momento.</div></div>';
    return;
  }
  const radarQ=(document.getElementById('radar-search')?.value||'').toLowerCase().trim();
  let items=ofertasData.items;
  if(radarActiveCat!=='all') items=items.filter(o=>o.categoria===radarActiveCat);
  if(radarQ) items=items.filter(o=>(o.titulo||'').toLowerCase().includes(radarQ)||(o.resumo||'').toLowerCase().includes(radarQ)||(o.programa||'').toLowerCase().includes(radarQ)||(o.loja||'').toLowerCase().includes(radarQ));
  if(!items.length){
    grid.innerHTML='<div class="status-box"><div style="font-size:30px">🔍</div><div style="color:var(--muted);font-size:13px">Nenhuma oferta nessa categoria.</div></div>';
    return;
  }
  // Ofertas vigentes primeiro, encerradas por último
  items=[...items].sort((a,b)=>(isOfertaEncerrada(a)?1:0)-(isOfertaEncerrada(b)?1:0));

  grid.innerHTML=items.map(o=>{
    const encerrada=isOfertaEncerrada(o);
    const temPrazo=o.prazo&&o.prazo.toLowerCase()!=='não informado';
    const ddmm=temPrazo?formatPrazoDDMM(o.prazo):'';
    return `
    <div class="oferta-card${encerrada?' encerrada':''}" data-oferta-id="${o.id}">
      <div class="oferta-card-top">
        <span class="oferta-emoji">${o.emoji||'📰'}</span>
        <span class="oferta-cat-badge">${(OFERTA_CAT_LABELS[o.categoria]||o.categoria||'').replace(/^[^ ]+ /,'')}</span>
      </div>
      <div class="oferta-titulo">${o.titulo}</div>
      <div class="oferta-resumo-mini">${o.resumo||''}</div>
      <div class="oferta-card-foot">
        ${ddmm?`<span class="oferta-prazo-mini">⏳ ${ddmm}</span>`:'<span></span>'}
        ${encerrada?'<span class="oferta-encerrada-badge">Encerrada</span>':''}
      </div>
    </div>
  `;}).join('');
}

function formatDataCurta(iso){
  try{
    return formatDataPadrao(new Date(iso));
  }catch(e){return '';}
}

function openOfertaModal(id){
  const o=(ofertasData&&ofertasData.items||[]).find(x=>x.id===id);
  if(!o) return;
  const encerrada=isOfertaEncerrada(o);
  document.getElementById('oferta-modal-emoji').textContent=o.emoji||'📰';
  document.getElementById('oferta-modal-titulo').textContent=o.titulo+(encerrada?' (Encerrada)':'');
  document.getElementById('oferta-modal-titulo').classList.toggle('encerrada-titulo',encerrada);
  document.getElementById('oferta-modal-meta').textContent=
    (o.programa?o.programa+' · ':'')+(OFERTA_CAT_LABELS[o.categoria]||o.categoria||'')+(o.publicadoEm?' · '+formatDataCurta(o.publicadoEm):'');
  document.getElementById('oferta-modal-resumo').textContent=o.resumo||'';

  const fatos=[];
  if(o.bonus) fatos.push(['Bônus / Ganho',o.bonus]);
  if(o.prazo) fatos.push(['Prazo',formatPrazoLimpo(o.prazo)+(encerrada?' (encerrada)':'')]);
  if(o.programa) fatos.push(['Programa',o.programa]);
  if(o.loja) fatos.push(['Loja',o.loja]);
  if(o.cupom) fatos.push(['Cupom',o.cupom]);
  if(o.categoria) fatos.push(['Categoria',OFERTA_CAT_LABELS[o.categoria]||o.categoria]);
  document.getElementById('oferta-modal-fatos').innerHTML=fatos.map(([label,val])=>
    `<div class="oferta-fato"><div class="oferta-fato-label">${label}</div><div class="oferta-fato-val">${val}</div></div>`
  ).join('');

  const restEl=document.getElementById('oferta-modal-restricoes');
  let restHtml='';
  if(o.milheiro){
    restHtml+='<strong style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Custo do milheiro</strong>'+
      '<div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:14px">'+
      o.milheiro.split('\n').map(l=>l.trim()).filter(Boolean).join('<br>')+'</div>';
  }
  if(o.tetoTransferencia){
    restHtml+='<strong style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Teto de bônus</strong>'+
      '<div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:14px">'+
      o.tetoTransferencia.split('\n').map(l=>l.trim()).filter(Boolean).join('<br>')+'</div>';
  }
  if(o.restricoes&&o.restricoes.length){
    restHtml+='<strong style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Condições e detalhes</strong>'+
      '<ul style="margin:6px 0 0 0;padding-left:20px;display:flex;flex-direction:column;gap:4px;list-style-position:outside">'+
      o.restricoes.map(r=>`<li style="font-size:12px;color:var(--muted);line-height:1.4">${r}</li>`).join('')+'</ul>';
  }
  restEl.innerHTML=restHtml;

  const importanteEl=document.getElementById('oferta-modal-importante');
  if(o.importante){
    importanteEl.style.display='block';
    importanteEl.innerHTML='⚠️ <strong>Importante:</strong> '+o.importante;
  } else {
    importanteEl.style.display='none';
    importanteEl.innerHTML='';
  }

  const linkEl=document.getElementById('oferta-modal-link');
  if(o.link){
    linkEl.style.display='block';
    linkEl.href=o.link;
  } else {
    linkEl.style.display='none';
    linkEl.removeAttribute('href');
  }

  document.getElementById('oferta-modal-overlay').classList.add('open');
}

function closeOfertaModal(){
  document.getElementById('oferta-modal-overlay').classList.remove('open');
}

function switchTab(tab){
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('tab-comparador').style.display = tab==='comparador'?'block':'none';
  document.getElementById('tab-radar').style.display = tab==='radar'?'block':'none';
  document.getElementById('tab-passagens').style.display = tab==='passagens'?'block':'none';
  if(tab==='radar') loadOfertas(false);
  if(tab==='passagens') loadPassagens(false);
  try{localStorage.setItem('cdv_active_tab', tab);}catch(e){}
}

document.getElementById('main-tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.main-tab');
  if(!btn) return;
  switchTab(btn.dataset.tab);
});

// Restaurar aba ao carregar
(function(){
  try{
    const saved=localStorage.getItem('cdv_active_tab');
    if(saved && saved!=='comparador') switchTab(saved);
  }catch(e){}
})();



document.getElementById('radar-cat-bar').addEventListener('click',e=>{
  const b=e.target.closest('[data-radarcat]');
  if(!b) return;
  radarActiveCat=b.dataset.radarcat;
  renderRadarCatBar();
  renderOfertas();
});

document.getElementById('radar-grid').addEventListener('click',e=>{
  const card=e.target.closest('.oferta-card[data-oferta-id]');
  if(card) openOfertaModal(card.dataset.ofertaId);
});

document.getElementById('oferta-modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('oferta-modal-overlay')) closeOfertaModal();
});
document.getElementById('oferta-modal-close-btn').addEventListener('click',closeOfertaModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOfertaModal();});

</script>
</body>
</html>
