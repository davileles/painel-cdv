name: Coletar dados CDV

on:
  schedule:
    # De 2 em 2 horas das 8h às 20h (SP = UTC-3): 11,13,15,17,19,21,23 UTC
    - cron: '15 11,13,15,17,19,21,23 * * *'
  workflow_dispatch: # permite rodar manualmente

jobs:
  coletar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Coletar dados
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node coletar.js

      - name: Salvar arquivos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico.json ofertas.json
          git diff --staged --quiet || git commit -m "chore: atualiza dados $(date -u +'%Y-%m-%d %H:%M')"
          git push
